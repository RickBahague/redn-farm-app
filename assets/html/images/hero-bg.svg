<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background with gradient -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.2"/>
            <stop offset="100%" style="stop-color:#81C784;stop-opacity:0.1"/>
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bgGradient)"/>
    
    <!-- Farm elements -->
    <path d="M100,500 L300,500 L200,400 Z" fill="#795548"/> <!-- Barn -->
    <rect x="150" y="450" width="100" height="50" fill="#8D6E63"/> <!-- Door -->
    <circle cx="900" cy="100" r="40" fill="#FFD54F"/> <!-- Sun -->
    
    <!-- Trees -->
    <g transform="translate(400,450)">
        <circle r="30" fill="#2E7D32"/>
        <rect x="-5" y="25" width="10" height="25" fill="#795548"/>
    </g>
    <g transform="translate(500,470)">
        <circle r="25" fill="#388E3C"/>
        <rect x="-5" y="20" width="10" height="20" fill="#795548"/>
    </g>
    
    <!-- Fields -->
    <path d="M600,450 Q900,450 1200,450" stroke="#8BC34A" stroke-width="5" fill="none"/>
    <path d="M600,470 Q900,470 1200,470" stroke="#8BC34A" stroke-width="5" fill="none"/>
    <path d="M600,490 Q900,490 1200,490" stroke="#8BC34A" stroke-width="5" fill="none"/>
</svg> 